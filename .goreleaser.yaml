# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: forgectl

before:
  hooks:
    - go mod tidy

# The build is split by OS purely so the archives can be: `archives[].ids`
# selects BUILD ids, so a darwin-only archive (the one carrying the Swift bless
# helper) needs a darwin-only build to point at. The two builds are otherwise
# identical — the ldflags anchor keeps the version injection from drifting.
builds:
  - id: forgectl-linux
    main: .
    binary: forgectl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags: &ldflags
      - -s -w
      - -X github.com/cameronsjo/forgectl/internal/meta.Version={{.Version}}
      - -X github.com/cameronsjo/forgectl/internal/meta.Commit={{.Commit}}
      - -X github.com/cameronsjo/forgectl/internal/meta.Date={{.Date}}

  - id: forgectl-darwin
    main: .
    binary: forgectl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags: *ldflags
    # Developer-ID sign the darwin forgectl binary once it is built. Guarded on
    # APPLE_TEAM_ID (passed through from the release workflow, itself set only
    # when the signing cert exists) so this is a pure no-op on unsigned/dev
    # builds. {{ .Path }} arrives as $0 to keep the shell quoting simple. Only
    # darwin — the linux build has no post-hook.
    hooks:
      post:
        - cmd: sh -c 'if [ -n "$APPLE_TEAM_ID" ]; then codesign --sign "Developer ID Application" --options runtime --timestamp --force "$0"; fi' "{{ .Path }}"

archives:
  # Linux ships the Go binary alone — `workflow bless` is macOS-only (it needs
  # the Secure Enclave), so the helper would be dead weight. Linux still
  # verifies blessings: that path is pure Go.
  - id: linux
    ids:
      - forgectl-linux
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # macOS additionally carries forgectl-bless-helper (a universal, ad-hoc-signed
  # Swift binary staged by the release workflow at dist-helper/). It must sit at
  # the archive ROOT: the Go side discovers it as a sibling of its own
  # executable — filepath.Join(filepath.Dir(os.Executable()), …) — which holds
  # both in the extracted archive and in the cask (Homebrew symlinks both
  # binaries into the same bin dir).
  - id: darwin
    ids:
      - forgectl-darwin
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      # Declaring `files` at all REPLACES goreleaser's built-in default list, so
      # these three are re-stated or the darwin archives quietly ship without a
      # LICENSE (the linux archives, which take the default, would still have
      # one — an easy divergence to miss).
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: dist-helper/forgectl-bless-helper
        strip_parent: true

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

# Homebrew formulae (`brews`) were removed in goreleaser v2.16 in favor of
# casks, so forgectl ships as a cask. `brew install cameronsjo/tap/forgectl`
# resolves it the same way.
homebrew_casks:
  - name: forgectl
    # A cask is macOS-only, so it feeds off the darwin archive — the one that
    # carries the bless helper.
    ids:
      - darwin
    repository:
      owner: cameronsjo
      name: homebrew-tap
      # PAT with contents:write on the tap repo — the default GITHUB_TOKEN only
      # reaches the current repo, so the cross-repo cask push needs this.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/cameronsjo/forgectl"
    description: "Personal tmux/dev-experience CLI for the headless workbench (supersedes the bash `s` script)"
    # Both binaries are linked into the Homebrew bin: forgectl shells out to
    # forgectl-bless-helper for the Touch ID ceremony and finds it as a sibling
    # of its own executable.
    binaries:
      - forgectl
      - forgectl-bless-helper
    # Strip the quarantine bit on both binaries or the first run prompts. When a
    # signing cert is configured the release Developer-ID signs both (the helper
    # in the workflow, forgectl via the darwin build post-hook); until then, or on
    # an unsigned build, they carry only an ad-hoc signature — enough for a Secure
    # Enclave key but not for Gatekeeper — so the xattr strip is still required.
    # Notarization would let this be dropped; it is not shipped yet.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/forgectl"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/forgectl-bless-helper"]
          end

release:
  github:
    owner: cameronsjo
    name: forgectl
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
