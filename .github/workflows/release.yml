name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  goreleaser:
    # macOS, not ubuntu: the bless helper is a Swift package and needs an Apple
    # toolchain. The Go cross-build for linux/{amd64,arm64} still works from
    # here — every target is CGO_ENABLED=0.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      # Import the Developer-ID signing certificate into an ephemeral keychain so
      # the helper and the darwin binaries can be Developer-ID signed. Gated on
      # HAS_CERT (an env expression — secrets are not usable in a step `if:`), so
      # the whole pipeline stays DORMANT until APPLE_CERTIFICATE_P12 is set: no
      # cert, no import, and the build below falls back to an ad-hoc signature.
      # Lifted from cameronsjo/minute's release workflow (a signed+notarized mac
      # app) so the secret names match 1:1.
      - name: Import signing certificate
        if: env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # errexit so a failed `security import` fails the step — without it the
          # trailing `rm -f` (always exit 0) would mask the failure and the build
          # would go green, then codesign later against an un-imported identity.
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | tr -d '"')"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      # The helper reports the release version from its own `version` verb, so
      # stamp it from the tag before compiling. Mirrors the -X ldflags the Go
      # binary gets from goreleaser.
      - name: Stamp helper version
        working-directory: helper/forgectl-bless-helper
        run: |
          set -euo pipefail
          swift --version
          cat > Sources/BlessHelperCore/Version.swift <<EOF
          // This file is trivially regenerable: a later release PR overwrites it with the
          // version derived from the release tag. Keep it a single top-level constant.
          public let helperVersion = "${GITHUB_REF_NAME#v}"
          EOF
          cat Sources/BlessHelperCore/Version.swift

      # Build the helper universal (arm64 + x86_64) so one cask serves Apple
      # Silicon and Intel, ad-hoc sign it (a Secure Enclave key needs *a*
      # signature — a stable one is what binds the key to this binary), and
      # stage it where .goreleaser.yaml's darwin archive picks it up.
      - name: Build bless helper (universal)
        working-directory: helper/forgectl-bless-helper
        env:
          # HAS_CERT selects Developer-ID signing over the ad-hoc fallback. It is
          # an env expression because secrets can't be read in a step `if:`; empty
          # when APPLE_CERTIFICATE_P12 is unset, keeping the ad-hoc path dormant.
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
        run: |
          set -euo pipefail
          swift build -c release --arch arm64 --arch x86_64
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/forgectl-bless-helper"
          # A Secure Enclave key needs *a* stable signature to bind to this binary.
          # With a cert present, use the real Developer-ID identity (hardened
          # runtime + secure timestamp) so Gatekeeper accepts it; otherwise keep
          # the ad-hoc signature that still satisfies the Secure Enclave.
          if [ "$HAS_CERT" = "true" ]; then
            codesign --sign "Developer ID Application" --options runtime --timestamp --force "$BIN"
          else
            codesign -s - -f "$BIN"
          fi
          mkdir -p "$GITHUB_WORKSPACE/dist-helper"
          cp "$BIN" "$GITHUB_WORKSPACE/dist-helper/forgectl-bless-helper"
          # Fail the release rather than quietly shipping a single-arch helper
          # to half the Mac users.
          ARCHS="$(lipo -archs "$GITHUB_WORKSPACE/dist-helper/forgectl-bless-helper")"
          echo "helper archs: $ARCHS"
          case " $ARCHS " in
            *" x86_64 "*) ;;
            *) echo "::error::bless helper is not universal (got: $ARCHS)"; exit 1 ;;
          esac
          case " $ARCHS " in
            *" arm64 "*) ;;
            *) echo "::error::bless helper is not universal (got: $ARCHS)"; exit 1 ;;
          esac
          codesign -dv "$GITHUB_WORKSPACE/dist-helper/forgectl-bless-helper"

      # Mint a short-lived token scoped to the tap repo via the GitHub App
      # (RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY), instead of a long-lived PAT.
      # GoReleaser uses the default GITHUB_TOKEN for the forgectl release and
      # this app token only for the cross-repo cask push.
      - name: Mint tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # App-minted, tap-scoped, short-lived — read by the homebrew_casks block.
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
          # Arms the darwin build's post-hook codesign. A SECRET (following
          # cameronsjo/minute), empty until set, so the hook is a no-op until then.
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
