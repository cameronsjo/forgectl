name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to a commit SHA: a mutable tag is a supply-chain seam. This job
        # only builds and tests, so it keeps no credential in .git/config either.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  macos-test:
    # Darwin-gated Go tests (runtime.GOOS skips) never execute on the ubuntu
    # job — this job exists so production wiring like the env clip client's
    # WithSensitive option is actually exercised in CI (#100). Build/Vet/gofmt
    # are platform-independent and stay ubuntu-only.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Test (Darwin-gated coverage)
        # -v is deliberate: the run log naming each formerly-skipped test as
        # PASS is the proof this coverage exists.
        run: go test -v ./...

  helper:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: helper/forgectl-bless-helper
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
