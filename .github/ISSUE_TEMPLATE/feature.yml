name: Feature / enhancement
description: A new capability or a behavior change to an existing one.
title: "feat(forgectl): "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part owns this? (Also set the title prefix to match, e.g. feat(cadence-forge).)
      options: [forgectl, claunch, other]
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do, and what currently gets in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should it behave? Be concrete — user-facing behavior, flags, output.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Alternatives / context
      description: Other approaches weighed, related issues, prior art. Optional.
    validations:
      required: false
